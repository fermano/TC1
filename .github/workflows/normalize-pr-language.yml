# temporary normalization workflow
name: Normalize PR Language

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/normalize-pr-language.yml

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Scrub explicit scenario wording
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_PATH: .github/workflows/normalize-pr-language.yml
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import time
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          workflow_path = os.environ["WORKFLOW_PATH"]
          base = f"https://api.github.com/repos/{repo}"

          reveal_labels = {
              "ops-fixture",
              "fixture",
              "test-fixture",
              "synthetic",
              "agent-test",
              "agentic-test",
              "status-flag-lies",
              "surface-green-deep-red",
              "dependabot-noise",
              "security-disguised",
              "needs-human-filter",
              "linear-ambiguous",
          }

          def request(method, url, data=None):
              payload = None if data is None else json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=payload, method=method)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              if payload is not None:
                  req.add_header("Content-Type", "application/json")
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read().decode("utf-8")
                      return json.loads(raw) if raw else None
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", "replace")
                  print(f"{method} {url} failed: {exc.code} {body}")
                  return None

          def pages(path):
              page = 1
              while True:
                  sep = "&" if "?" in path else "?"
                  data = request("GET", f"{base}{path}{sep}per_page=100&page={page}")
                  if not data:
                      break
                  for item in data:
                      yield item
                  if len(data) < 100:
                      break
                  page += 1

          line_replacements = [
              (r"^## Scenario metadata\s*$", "## Triage notes"),
              (r"^- Simulated opened date:\s*", "- Opened for triage: "),
              (r"^- Simulated last activity date:\s*", "- Last activity noted: "),
              (r"^- Expected blocker:\s*", "- Current concern: "),
              (r"^- Risk level:\s*", "- Review priority: "),
          ]

          phrase_replacements = [
              ("No Linear tracking exists by design; workflow agents should detect the missing counterpart. ", ""),
              ("No Linear tracking exists by design; workflow agents should detect the missing counterpart.", ""),
              ("No Linear tracking exists by design; ", ""),
              ("No Linear tracking exists by design", ""),
              ("workflow agents should detect the missing counterpart. ", ""),
              ("workflow agents should detect the missing counterpart.", ""),
              ("workflow agents have", "release team has"),
              ("workflow agents", "reviewers"),
              ("agentic workflow", "workflow"),
              ("for agents that must inspect red checks before recommending action", "for the current validation path"),
              ("synthetic ops fixture", "ops review"),
              ("TC1 fixture", "TC1 operations data"),
              ("fixture scenarios", "follow-up scenarios"),
              ("fixture rule", "tracking rule"),
              ("fixture-validation", "validation"),
              ("fixture validation", "validation suite"),
              ("fixture failures", "validation failures"),
              ("fixture brittleness", "test brittleness"),
              ("workflow tests", "release validation"),
              ("intentionally omits", "does not include"),
              ("intentionally leaves", "leaves"),
              ("intentionally duplicates", "duplicates"),
              ("intentionally conflicts", "conflicts"),
              ("intentionally mixes", "mixes"),
              ("intentionally outdated", "outdated"),
              ("intentionally too low", "too low"),
              ("intentionally remain", "remain"),
              ("intentionally ", ""),
              ("Scenario type", "Review category"),
              ("Expected blocker", "Current concern"),
              ("Linear tracking exists", "Tracking"),
              ("DISCUSSION-SEED-2026-05-20", ""),
              ("This tests agents", "This needs reviewer attention"),
              ("tests agents", "needs reviewer attention"),
          ]

          def clean_body(text):
              if not text:
                  return text
              out_lines = []
              for line in text.splitlines():
                  if re.match(r"^- Scenario type:\s*", line):
                      continue
                  if re.match(r"^- Linear tracking exists:\s*", line):
                      continue
                  new_line = line
                  for pattern, repl in line_replacements:
                      new_line = re.sub(pattern, repl, new_line)
                  out_lines.append(new_line)
              out = "\n".join(out_lines)
              for old, new in phrase_replacements:
                  out = out.replace(old, new)
              out = re.sub(r"\n{3,}", "\n\n", out).strip() + "\n"
              return out

          def clean_title(title):
              if not title:
                  return title
              out = re.sub(r"\s*\[sim \d{4}-\d{2}-\d{2}\]", "", title)
              out = out.replace("fixture-validation", "validation")
              out = out.replace("fixture validation", "validation suite")
              out = out.replace("fixture brittleness", "test brittleness")
              out = out.replace("workflow scorecard", "review scorecard")
              return out.strip()

          def maybe_patch_pr(number):
              pr = request("GET", f"{base}/pulls/{number}")
              if not pr or "number" not in pr:
                  return
              new_body = clean_body(pr.get("body") or "")
              new_title = clean_title(pr.get("title") or "")
              patch = {}
              if new_body != (pr.get("body") or ""):
                  patch["body"] = new_body
              if new_title != (pr.get("title") or ""):
                  patch["title"] = new_title
              if patch:
                  request("PATCH", f"{base}/pulls/{number}", patch)
                  print(f"updated PR #{number}")

          def scrub_comments(number):
              for comment in pages(f"/issues/{number}/comments"):
                  body = comment.get("body") or ""
                  new_body = clean_body(body)
                  if new_body != body:
                      request("PATCH", f"{base}/issues/comments/{comment['id']}", {"body": new_body})
                      print(f"updated issue comment {comment['id']} on #{number}")
              for comment in pages(f"/pulls/{number}/comments"):
                  body = comment.get("body") or ""
                  new_body = clean_body(body)
                  if new_body != body:
                      request("PATCH", f"{base}/pulls/comments/{comment['id']}", {"body": new_body})
                      print(f"updated review comment {comment['id']} on #{number}")

          def scrub_labels(number):
              labels = request("GET", f"{base}/issues/{number}/labels?per_page=100") or []
              for label in labels:
                  name = label.get("name", "")
                  lname = name.lower()
                  if lname.startswith("sim-date:") or lname in reveal_labels:
                      encoded = urllib.parse.quote(name, safe="")
                      request("DELETE", f"{base}/issues/{number}/labels/{encoded}")
                      print(f"removed label {name} from #{number}")

          for number in range(1, 93):
              maybe_patch_pr(number)
              scrub_comments(number)
              scrub_labels(number)
              time.sleep(0.05)

          meta = request("GET", f"{base}/contents/{urllib.parse.quote(workflow_path)}?ref=main")
          if meta and meta.get("sha"):
              request("DELETE", f"{base}/contents/{urllib.parse.quote(workflow_path)}", {
                  "message": "Remove temporary PR language normalization workflow",
                  "sha": meta["sha"],
                  "branch": "main",
              })
              print("removed temporary workflow")
          PY
