name: Restore PR head refs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore PR head branches and remove duplicate aliases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          make_slug() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/\[[^]]+\]//g; s/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' \
              | cut -c1-70
          }

          gh api -X GET "repos/$REPO/pulls?state=open&per_page=100" --paginate --jq '.[] | @base64' | while read -r row; do
            json=$(printf '%s' "$row" | base64 -d)
            number=$(printf '%s' "$json" | jq -r '.number')
            title=$(printf '%s' "$json" | jq -r '.title')
            old=$(printf '%s' "$json" | jq -r '.head.ref')
            sha=$(printf '%s' "$json" | jq -r '.head.sha')
            head_repo=$(printf '%s' "$json" | jq -r '.head.repo.full_name')

            if [ "$head_repo" != "$REPO" ]; then
              continue
            fi

            encoded_old=$(jq -nr --arg v "$old" '$v|@uri')
            if ! gh api -X GET "repos/$REPO/git/ref/heads/$encoded_old" >/tmp/ref.json 2>/tmp/ref.err; then
              echo "Restoring PR #$number head branch $old at $sha"
              if ! gh api -X POST "repos/$REPO/git/refs" -f ref="refs/heads/$old" -f sha="$sha" >/tmp/create-ref.json 2>/tmp/create-ref.err; then
                cat /tmp/create-ref.err
              fi
            fi

            alias="$old"
            case "$old" in
              ops-fixture/*|messy/*)
                slug=$(make_slug "$title")
                if [ -z "$slug" ]; then
                  slug="branch"
                fi
                alias="ops/pr-$(printf '%03d' "$number")-$slug"
                ;;
              dependabot/*)
                alias=${old%-fixture}
                alias=${alias%-security-disguised}
                ;;
            esac

            if [ "$alias" != "$old" ]; then
              encoded_alias=$(jq -nr --arg v "$alias" '$v|@uri')
              if gh api -X GET "repos/$REPO/git/ref/heads/$encoded_alias" >/tmp/alias-ref.json 2>/tmp/alias-ref.err; then
                echo "Deleting duplicate branch alias $alias"
                gh api -X DELETE "repos/$REPO/git/refs/heads/$encoded_alias" >/tmp/delete-alias.json 2>/tmp/delete-alias.err || cat /tmp/delete-alias.err
              fi
            fi
          done

      - name: Remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --ff-only origin main
          rm -f .github/workflows/restore-pr-head-refs.yml
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove temporary PR head ref restore workflow"
            git push origin main
          fi
