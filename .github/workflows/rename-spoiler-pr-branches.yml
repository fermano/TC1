name: Rename spoiler PR branches

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename open PR branches
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          make_slug() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/\[[^]]+\]//g; s/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' \
              | cut -c1-70
          }

          gh api -X GET "repos/$REPO/pulls?state=open&per_page=100" --paginate --jq '.[] | @base64' | while read -r row; do
            json=$(printf '%s' "$row" | base64 -d)
            number=$(printf '%s' "$json" | jq -r '.number')
            title=$(printf '%s' "$json" | jq -r '.title')
            old=$(printf '%s' "$json" | jq -r '.head.ref')
            head_repo=$(printf '%s' "$json" | jq -r '.head.repo.full_name')

            if [ "$head_repo" != "$REPO" ]; then
              continue
            fi

            new="$old"
            case "$old" in
              ops-fixture/*|messy/*)
                slug=$(make_slug "$title")
                if [ -z "$slug" ]; then
                  slug="branch"
                fi
                new="ops/pr-$(printf '%03d' "$number")-$slug"
                ;;
              dependabot/*)
                new=${old%-fixture}
                new=${new%-security-disguised}
                ;;
            esac

            if [ "$new" = "$old" ]; then
              continue
            fi

            encoded=$(jq -nr --arg v "$old" '$v|@uri')
            echo "Renaming PR #$number: $old -> $new"
            if ! gh api -X POST "repos/$REPO/branches/$encoded/rename" -f new_name="$new" >/tmp/rename-response.json 2>/tmp/rename-error.txt; then
              echo "Failed to rename $old"
              cat /tmp/rename-error.txt
            fi
          done

      - name: Remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --ff-only origin main
          rm -f .github/workflows/rename-spoiler-pr-branches.yml
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove temporary branch rename workflow"
            git push origin main
          fi
