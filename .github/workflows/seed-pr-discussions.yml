name: Seed PR discussions
# trigger: 2026-05-20T19:36:00Z

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/seed-pr-discussions.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  seed-discussions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Add synthetic discussion reviews
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const token = process.env.GH_TOKEN;
          const [owner, repo] = process.env.REPOSITORY.split('/');
          const targetPrs = Array.from({ length: 49 }, (_, index) => index + 17);
          const marker = 'DISCUSSION-SEED-2026-05-20';
          const batchSize = 5;

          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

          async function githubGraphql(query, variables) {
            const response = await fetch('https://api.github.com/graphql', {
              method: 'POST',
              headers: {
                authorization: `Bearer ${token}`,
                accept: 'application/vnd.github+json',
                'content-type': 'application/json',
                'user-agent': 'tc1-discussion-seeder'
              },
              body: JSON.stringify({ query, variables })
            });
            const payload = await response.json();
            if (!response.ok || payload.errors) {
              throw new Error(JSON.stringify({ status: response.status, payload }, null, 2));
            }
            return payload.data;
          }

          async function withRetry(label, fn) {
            let lastError;
            for (let attempt = 1; attempt <= 4; attempt += 1) {
              try {
                return await fn();
              } catch (error) {
                lastError = error;
                console.log(`${label} failed on attempt ${attempt}: ${error.message.slice(0, 600)}`);
                await sleep(2000 * attempt);
              }
            }
            throw lastError;
          }

          async function pullRequestContext(number) {
            const query = `
              query PullRequestContext($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    title
                    files(first: 1) {
                      nodes {
                        path
                      }
                    }
                  }
                }
              }
            `;
            const data = await withRetry(`fetch context for PR #${number}`, () => githubGraphql(query, { owner, repo, number }));
            const pr = data.repository.pullRequest;
            if (!pr) throw new Error(`PR #${number} not found`);
            const path = pr.files.nodes[0]?.path;
            if (!path) throw new Error(`PR #${number} has no changed files`);
            return { id: pr.id, title: pr.title, path };
          }

          function discussionComments(number, title, path) {
            const roles = [
              'reviewer',
              'author',
              'qa',
              'release-manager',
              'security-reviewer',
              'product-owner'
            ];
            const topics = [
              'scope and ownership',
              'validation evidence',
              'test coverage',
              'rollback posture',
              'dependency on adjacent work',
              'release timing',
              'documentation drift',
              'risk classification',
              'CI confidence',
              'acceptance criteria'
            ];
            return Array.from({ length: 30 }, (_, index) => {
              const turn = index + 1;
              const role = roles[index % roles.length];
              const topic = topics[index % topics.length];
              const phase = turn <= 10 ? 'triage' : turn <= 20 ? 'review' : 'resolution';
              return {
                path,
                position: 1,
                body: `${marker} | PR #${number} | turn ${turn}/30 | ${role}: ${phase} discussion on ${topic}. This synthetic comment keeps the operational thread realistic for agent workflow tests. PR title: "${title}".`
              };
            });
          }

          async function addReviewBatch(number, context, comments, batchIndex, batchCount) {
            const mutation = `
              mutation AddSyntheticDiscussion($pullRequestId: ID!, $body: String!, $comments: [DraftPullRequestReviewComment!]!) {
                addPullRequestReview(input: {
                  pullRequestId: $pullRequestId,
                  event: COMMENT,
                  body: $body,
                  comments: $comments
                }) {
                  pullRequestReview {
                    id
                  }
                }
              }
            `;
            const body = `${marker}: synthetic discussion batch ${batchIndex + 1}/${batchCount} for PR #${number}.`;
            return withRetry(`seed PR #${number} batch ${batchIndex + 1}/${batchCount}`, () => githubGraphql(mutation, {
              pullRequestId: context.id,
              body,
              comments
            }));
          }

          let createdInlineComments = 0;
          for (const number of targetPrs) {
            const context = await pullRequestContext(number);
            const comments = discussionComments(number, context.title, context.path);
            const batches = [];
            for (let start = 0; start < comments.length; start += batchSize) {
              batches.push(comments.slice(start, start + batchSize));
            }
            console.log(`Seeding PR #${number}: ${context.title} (${context.path}) with ${comments.length} comments in ${batches.length} batches`);
            for (let batchIndex = 0; batchIndex < batches.length; batchIndex += 1) {
              await addReviewBatch(number, context, batches[batchIndex], batchIndex, batches.length);
              createdInlineComments += batches[batchIndex].length;
              await sleep(750);
            }
          }

          console.log(`Seeded ${targetPrs.length} PRs with ${createdInlineComments} inline discussion comments.`);
          NODE
