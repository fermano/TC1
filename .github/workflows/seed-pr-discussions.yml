name: Seed PR discussions
# trigger: 2026-05-20T19:45:00Z

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/seed-pr-discussions.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  seed-discussions:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Resume synthetic discussion reviews
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const token = process.env.GH_TOKEN;
          const [owner, repo] = process.env.REPOSITORY.split('/');
          const plan = [
            { number: 19, skipTurns: 5 },
            ...Array.from({ length: 46 }, (_, index) => ({ number: index + 20, skipTurns: 0 }))
          ];
          const marker = 'DISCUSSION-SEED-2026-05-20';
          const batchSize = 10;
          const normalDelayMs = 12000;

          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

          function isThrottle(error) {
            return /submitted too quickly|secondary rate|abuse/i.test(error.message);
          }

          function isResourceLimit(error) {
            return /RESOURCE_LIMITS_EXCEEDED|Resource limits/i.test(error.message);
          }

          async function githubGraphql(query, variables) {
            const response = await fetch('https://api.github.com/graphql', {
              method: 'POST',
              headers: {
                authorization: `Bearer ${token}`,
                accept: 'application/vnd.github+json',
                'content-type': 'application/json',
                'user-agent': 'tc1-discussion-seeder'
              },
              body: JSON.stringify({ query, variables })
            });
            const payload = await response.json();
            if (!response.ok || payload.errors) {
              throw new Error(JSON.stringify({ status: response.status, payload }, null, 2));
            }
            return payload.data;
          }

          async function withRetry(label, fn) {
            let lastError;
            for (let attempt = 1; attempt <= 5; attempt += 1) {
              try {
                return await fn();
              } catch (error) {
                lastError = error;
                const delay = isThrottle(error) ? 45000 * attempt : 5000 * attempt;
                console.log(`${label} failed on attempt ${attempt}: ${error.message.slice(0, 700)}`);
                console.log(`Waiting ${delay}ms before retry`);
                await sleep(delay);
              }
            }
            throw lastError;
          }

          async function pullRequestContext(number) {
            const query = `
              query PullRequestContext($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    title
                    files(first: 1) {
                      nodes {
                        path
                      }
                    }
                  }
                }
              }
            `;
            const data = await withRetry(`fetch context for PR #${number}`, () => githubGraphql(query, { owner, repo, number }));
            const pr = data.repository.pullRequest;
            if (!pr) throw new Error(`PR #${number} not found`);
            const path = pr.files.nodes[0]?.path;
            if (!path) throw new Error(`PR #${number} has no changed files`);
            return { id: pr.id, title: pr.title, path };
          }

          function discussionComments(number, title, path) {
            const roles = [
              'reviewer',
              'author',
              'qa',
              'release-manager',
              'security-reviewer',
              'product-owner'
            ];
            const topics = [
              'scope and ownership',
              'validation evidence',
              'test coverage',
              'rollback posture',
              'dependency on adjacent work',
              'release timing',
              'documentation drift',
              'risk classification',
              'CI confidence',
              'acceptance criteria'
            ];
            return Array.from({ length: 30 }, (_, index) => {
              const turn = index + 1;
              const role = roles[index % roles.length];
              const topic = topics[index % topics.length];
              const phase = turn <= 10 ? 'triage' : turn <= 20 ? 'review' : 'resolution';
              return {
                path,
                position: 1,
                body: `${marker} | PR #${number} | turn ${turn}/30 | ${role}: ${phase} discussion on ${topic}. This synthetic comment keeps the operational thread realistic for agent workflow tests. PR title: "${title}".`
              };
            });
          }

          async function submitReview(number, context, comments, label) {
            const mutation = `
              mutation AddSyntheticDiscussion($pullRequestId: ID!, $body: String!, $comments: [DraftPullRequestReviewComment!]!) {
                addPullRequestReview(input: {
                  pullRequestId: $pullRequestId,
                  event: COMMENT,
                  body: $body,
                  comments: $comments
                }) {
                  pullRequestReview {
                    id
                  }
                }
              }
            `;
            const body = `${marker}: synthetic discussion ${label} for PR #${number}.`;
            return githubGraphql(mutation, {
              pullRequestId: context.id,
              body,
              comments
            });
          }

          async function addReviewBatch(number, context, comments, label) {
            if (comments.length === 0) return;
            try {
              await withRetry(`seed PR #${number} ${label}`, () => submitReview(number, context, comments, label));
            } catch (error) {
              if (isResourceLimit(error) && comments.length > 1) {
                const middle = Math.ceil(comments.length / 2);
                await addReviewBatch(number, context, comments.slice(0, middle), `${label}.a`);
                await sleep(normalDelayMs);
                await addReviewBatch(number, context, comments.slice(middle), `${label}.b`);
                return;
              }
              throw error;
            }
          }

          let createdInlineComments = 0;
          for (const item of plan) {
            const context = await pullRequestContext(item.number);
            const comments = discussionComments(item.number, context.title, context.path).slice(item.skipTurns);
            const batches = [];
            for (let start = 0; start < comments.length; start += batchSize) {
              batches.push(comments.slice(start, start + batchSize));
            }
            console.log(`Seeding PR #${item.number}: ${context.title} (${context.path}); skipTurns=${item.skipTurns}; remaining=${comments.length}; batches=${batches.length}`);
            for (let batchIndex = 0; batchIndex < batches.length; batchIndex += 1) {
              await addReviewBatch(item.number, context, batches[batchIndex], `batch ${batchIndex + 1}/${batches.length}`);
              createdInlineComments += batches[batchIndex].length;
              await sleep(normalDelayMs);
            }
          }

          console.log(`Seeded resumed plan with ${createdInlineComments} inline discussion comments.`);
          NODE
