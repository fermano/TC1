name: Normalize operations branches

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize-branches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize branch notes
        shell: bash
        run: |
          set -u
          BASE_SHA="1fd715bd1763a1e20b1115e6be2a496347845422"
          WORKFLOW_FILE=".github/workflows/normalize-operations-branches.yml"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          failed=0

          normalize_branch() {
            local branch="$1"
            echo "Normalizing $branch"
            git reset --hard
            git clean -fd
            git checkout -B "$branch" "origin/$branch"

            if ! git merge --no-edit "$BASE_SHA"; then
              echo "Merge needed manual fallback for $branch"
              git merge --abort || true
              for path in \
                .github/workflows/ci.yml \
                README.md \
                config/operations.yml \
                docs/architecture.md \
                docs/incidents/handoff-template.md \
                docs/operations/tracking-hygiene.md \
                docs/release-readiness/internal-rollback-verification.md \
                docs/release-readiness/may-2026-cutoff-checklist.md \
                docs/runbook.md \
                scripts/verify_repo_baseline.py \
                src/tc1_service.py \
                tests/test_owner_normalization_edges.py
              do
                if git cat-file -e "$BASE_SHA:$path" 2>/dev/null; then
                  mkdir -p "$(dirname "$path")"
                  git checkout "$BASE_SHA" -- "$path"
                fi
              done
              git rm -f docs/workflow-tests/linear-tracking-validation.md scripts/verify_fixture.py || true
            fi

            rm -f "$WORKFLOW_FILE"

            python3 <<'PY'
          from pathlib import Path

          replacements = {
              "Fixture": "Baseline",
              "fixture": "baseline",
              "Synthetic": "Sample",
              "synthetic": "sample",
              "Scenario": "Case",
              "scenario": "case",
              "workflow agents": "review automation",
              "Workflow agents": "Review automation",
              "workflow-test": "review",
              "workflow testing": "review",
              "testing agents": "review automation",
              "answer key": "internal note",
          }

          def clean_text(text: str) -> str:
              for old, new in replacements.items():
                  text = text.replace(old, new)
              return text

          notes_root = Path("ops/scenario-notes")
          if notes_root.exists():
              target_root = Path("ops/review-notes")
              target_root.mkdir(parents=True, exist_ok=True)
              for path in list(notes_root.glob("*.md")):
                  lines = path.read_text().splitlines()
                  dates = []
                  out = []
                  for line in lines:
                      if line.startswith(("Scenario type:", "Risk level:", "Linear tracking:")):
                          continue
                      if line.startswith("Simulated opened:"):
                          dates.append(("First raised", line.split(":", 1)[1].strip()))
                          continue
                      if line.startswith("Simulated last activity:"):
                          dates.append(("Last update", line.split(":", 1)[1].strip()))
                          continue
                      if line.startswith("Expected blocker:"):
                          out.append("Review concern: " + line.split(":", 1)[1].strip())
                          continue
                      out.append(line)

                  text = "\n".join(out).strip() + "\n"
                  if dates:
                      parts = text.split("\n", 1)
                      title = parts[0]
                      rest = parts[1].lstrip() if len(parts) > 1 else ""
                      date_block = "\n".join(f"{key}: {value}" for key, value in dates)
                      text = f"{title}\n\n{date_block}\n\n{rest}".rstrip() + "\n"

                  text = clean_text(text)
                  new_name = path.name.replace("fixture", "baseline").replace("scenario", "case")
                  (target_root / new_name).write_text(text)
                  path.unlink()
              try:
                  notes_root.rmdir()
              except OSError:
                  pass

          for root in [Path("README.md"), Path("docs"), Path("src"), Path("scripts"), Path("config"), Path(".github")]:
              paths = [root] if root.is_file() else list(root.rglob("*")) if root.exists() else []
              for path in paths:
                  if not path.is_file():
                      continue
                  try:
                      text = path.read_text()
                  except UnicodeDecodeError:
                      continue
                  updated = clean_text(text)
                  updated = updated.replace("verify_baseline.py", "verify_repo_baseline.py")
                  updated = updated.replace("baseline-validation", "repository-baseline")
                  updated = updated.replace("Missing baseline paths", "Missing required repository paths")
                  updated = updated.replace("TC1 baseline baseline", "TC1 repository baseline")
                  if updated != text:
                      path.write_text(updated)
          PY

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "Normalize operations notes"
            fi
            if ! git push origin "HEAD:refs/heads/$branch"; then
              echo "Push failed for $branch"
              failed=1
            fi
          }

          while IFS= read -r remote_ref; do
            branch="${remote_ref#origin/}"
            case "$branch" in
              HEAD|main) continue ;;
              dependabot/*|messy/*|ops/*|ops-fixture/*) normalize_branch "$branch" ;;
            esac
          done < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin)

          git reset --hard
          git clean -fd
          git checkout main
          git pull --ff-only origin main
          rm -f "$WORKFLOW_FILE"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove temporary branch normalization workflow"
            git push origin main
          fi

          exit "$failed"
