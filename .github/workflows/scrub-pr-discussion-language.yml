name: Scrub PR discussion language

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/scrub-pr-discussion-language.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scrub:
    runs-on: ubuntu-latest
    steps:
      - name: Rewrite seeded discussion language
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function needsScrub(body) {
              return /synthetic|simulated|DISCUSSION-SEED|\[sim\s+20\d{2}-\d{2}-\d{2}\]|agent release validation|operational thread realistic/i.test(body || '');
            }

            function normalizeTopic(topic) {
              const map = {
                'scope and ownership': 'Scope and ownership still need one clear answer before this moves forward.',
                'validation evidence': 'Validation evidence needs to be attached in the PR, not summarized elsewhere.',
                'test coverage': 'Please call out which coverage is new and which cases remain out of scope.',
                'rollback posture': 'Rollback notes need to say who owns the decision if the rollout is paused.',
                'dependency on adjacent work': 'Please confirm whether this depends on another branch before review continues.',
                'release timing': 'Release timing should be confirmed against the current train schedule.',
                'documentation drift': 'The docs and runbook should be reconciled in the same pass.',
                'risk classification': 'Risk level is still unclear from the current thread.',
                'CI confidence': 'CI results need to be checked against required jobs, not only the summary.',
                'acceptance criteria': 'Acceptance criteria need to be specific enough for reviewers to close the loop.'
              };
              return map[topic] || `Please resolve the open ${topic} thread before approval.`;
            }

            function cleanIssueBody(body) {
              let next = body || '';
              next = next.replace(/^Simulated\s+/i, '');
              next = next.replace(/^simulation\s+/i, '');
              next = next.replace(/^Synthetic\s+/i, '');
              next = next.replace(/\bsynthetic\b/gi, '');
              next = next.replace(/\[sim\s+20\d{2}-\d{2}-\d{2}\]/gi, '').replace(/\s{2,}/g, ' ');
              next = next.replace(/This comment keeps the operational thread realistic for agent release validation\.?/gi, '');
              next = next.replace(/DISCUSSION-SEED-2026-05-20:[^\n]*/gi, 'Review pass recorded for this discussion.');
              return next.trim() || 'Review note recorded.';
            }

            function cleanReviewBody(body) {
              const text = body || '';
              const role = (text.match(/\|\s*PR #\d+\s*\|\s*turn \d+\/\d+\s*\|\s*([^:|]+):/i) || [])[1]?.trim() || 'reviewer';
              const phase = (text.match(/:\s*(triage|review|resolution) discussion on/i) || [])[1] || 'review';
              const topic = (text.match(/discussion on ([^.]+)\./i) || [])[1]?.trim() || 'follow-up';
              if (/DISCUSSION-SEED/i.test(text)) {
                return 'Review pass recorded. See inline comments for the current open points.';
              }
              return `[${role}] ${phase.charAt(0).toUpperCase() + phase.slice(1)} note: ${normalizeTopic(topic)}`;
            }

            async function paginate(fn) {
              return await github.paginate(fn, { owner, repo, per_page: 100 });
            }

            const pulls = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'all', per_page: 100 });
            let changed = { issueComments: 0, reviewComments: 0, reviews: 0 };

            for (const pr of pulls) {
              const issueComments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: pr.number, per_page: 100 });
              for (const c of issueComments) {
                if (!needsScrub(c.body)) continue;
                await github.rest.issues.updateComment({ owner, repo, comment_id: c.id, body: cleanIssueBody(c.body) });
                changed.issueComments++;
              }

              const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, { owner, repo, pull_number: pr.number, per_page: 100 });
              for (const c of reviewComments) {
                if (!needsScrub(c.body)) continue;
                await github.rest.pulls.updateReviewComment({ owner, repo, comment_id: c.id, body: cleanReviewBody(c.body) });
                changed.reviewComments++;
              }

              const reviews = await github.paginate(github.rest.pulls.listReviews, { owner, repo, pull_number: pr.number, per_page: 100 });
              for (const r of reviews) {
                if (!needsScrub(r.body)) continue;
                try {
                  await github.request('PUT /repos/{owner}/{repo}/pulls/{pull_number}/reviews/{review_id}', {
                    owner,
                    repo,
                    pull_number: pr.number,
                    review_id: r.id,
                    body: cleanReviewBody(r.body)
                  });
                  changed.reviews++;
                } catch (error) {
                  core.warning(`Could not update review ${r.id} on PR #${pr.number}: ${error.message}`);
                }
              }
            }

            core.notice(`Scrubbed ${changed.issueComments} issue comments, ${changed.reviewComments} review comments, ${changed.reviews} review summaries.`);

      - name: Remove temporary workflow
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/scrub-pr-discussion-language.yml';
            const ref = 'main';
            try {
              const file = await github.rest.repos.getContent({ owner, repo, path, ref });
              await github.rest.repos.deleteFile({
                owner,
                repo,
                path,
                sha: file.data.sha,
                branch: ref,
                message: 'Remove temporary PR discussion language scrubber'
              });
            } catch (error) {
              core.warning(`Could not remove temporary workflow: ${error.message}`);
            }
