name: Normalize repository metadata

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repository description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh api -X PATCH "repos/$REPO" -f description='TC1 operations service' || true
          git pull --ff-only origin main
          rm -f .github/workflows/normalize-repo-metadata.yml
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove temporary repository metadata workflow"
            git push origin main
          fi
