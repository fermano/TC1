name: RC57 compatibility

on:
  pull_request:
    branches:
      - release/rc-57

jobs:
  compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest tests/test_rc57_checkpoint.py tests/test_rc57_store.py tests/test_rc57_release_matrix.py
        env:
          RC57_MATRIX: "1"
