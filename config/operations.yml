release:
  train: weekly
  freeze_day: Wednesday
  default_channel: internal
  rollback_owner: release-management

review:
  stale_after_days: 4
  required_reviewers: 2
  escalation_channel: engineering-ops

ci:
  required_jobs:
    - unit-tests
    - repository-baseline
  flaky_test_budget: 3
  rerun_owner: qa

ownership:
  default_owner: platform-ops
  fallback_triage: engineering-ops
